name: Agent Guard Docker Build & Push

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version for the deployment'
        required: true

jobs:
  build-agent-guard:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v2

      - name: DockerHub login
        env:
          DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
          DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
        run: |
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

      - name: Build, tag, and push the image to DockerHub
        id: build-image-dockerhub
        env:
          ECR_REGISTRY: aktosecurity
          IMAGE_VERSION: ${{ github.event.inputs.release_version }}
          IMAGE_TAG_LOCAL: local
        run: |
          docker buildx create --use
          cd apps/agent-guard/python-service/container
          docker buildx build --platform linux/arm64/v8,linux/amd64 -t $ECR_REGISTRY/akto-agent-guard-executor:$IMAGE_TAG_LOCAL -t $ECR_REGISTRY/akto-agent-guard-executor:$IMAGE_VERSION . --push
          echo "::set-output name=image::$ECR_REGISTRY/akto-agent-guard-executor:$IMAGE_VERSION"

      - name: Configure AWS Credentials for ECR
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: "true"
          registry-type: public

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REGISTRY_ALIAS: p7q3h0z2
          IMAGE_VERSION: ${{ github.event.inputs.release_version }}
          IMAGE_TAG_LOCAL: local
        run: |
          docker buildx create --use
          cd apps/agent-guard/python-service/container
          docker buildx build --platform linux/arm64/v8,linux/amd64 -t $ECR_REGISTRY/$REGISTRY_ALIAS/akto-agent-guard-executor:$IMAGE_TAG_LOCAL -t $ECR_REGISTRY/$REGISTRY_ALIAS/akto-agent-guard-executor:$IMAGE_VERSION . --push

      - name: Push git tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: agent-guard-${{ github.event.inputs.release_version }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1.12.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          omitBody: true

      - name: Send Github release notification to Slack
        id: slack
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "🚀 Agent Guard Docker v${{ github.event.inputs.release_version }} released and pushed to DockerHub & ECR!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send failure notification to Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          payload: |
            {
              "text": "❌ Agent Guard Docker build v${{ github.event.inputs.release_version }} failed! Check the workflow for details."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
